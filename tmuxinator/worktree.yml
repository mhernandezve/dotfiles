name: <%= @args[0] %>
root: <%= @args[1] %>

on_project_start:
  - "[ -f \"./.env\" ] && . ./.env" 

windows:
  - editor:
      layout: 7182,159x43,0,0[159x32,0,0,1,159x10,0,33,3]
      panes:
        - editor:
            - v
        - shell:
            - 
  - command-line:
      layout: even-vertical
      panes:
        - claude:
            - claude update && claude continue
        - codex:
            - npm install -g @openai/codex@latest && codex resume
